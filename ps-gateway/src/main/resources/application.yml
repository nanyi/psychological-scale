server:
  port: 8080

spring:
  application:
    name: ps-gateway
  cloud:
    nacos:
      # 服务发现配置
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
        watch-delay: 5000
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      # 配置中心配置
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 用户服务
        - id: ps-user
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**,/api/auth/**
          filters:
            - StripPrefix=0
        # 量表服务
        - id: ps-scale
          uri: lb://ps-scale
          predicates:
            - Path=/api/scale/**
          filters:
            - StripPrefix=1
        # 订单服务
        - id: ps-order
          uri: lb://ps-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        # 支付服务
        - id: ps-payment
          uri: lb://ps-payment
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
        # 报告服务
        - id: ps-report
          uri: lb://ps-report
          predicates:
            - Path=/api/report/**
          filters:
            - StripPrefix=1
        # 第三方服务
        - id: ps-thirdparty
          uri: lb://ps-thirdparty
          predicates:
            - Path=/api/thirdparty/**
          filters:
            - StripPrefix=1
        # 分析服务
        - id: ps-analysis
          uri: lb://ps-analysis
          predicates:
            - Path=/api/analysis/**
          filters:
            - StripPrefix=1
  config:
    import:
      optional: nacos
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:psychological-scale-secret-key-change-in-production}
  issuer: ${JWT_ISSUER:psychological-scale}
  access-token-validity: 7200
  refresh-token-validity: 604800

# Sentinel配置
sentinel:
  eager: true
  transport:
    dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
  gateway:
    discovery:
      locator:
        enabled: true

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.cloud.gateway.handler: DEBUG
    com.iotsic.ps.gateway: DEBUG
    com.alibaba.cloud.nacos: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
