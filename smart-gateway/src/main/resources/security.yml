# 内置配置 不允许修改 如需修改请在 业务服务配置 上写相同配置覆盖

smart:
  # security配置
  security:
    check-url: http://smart-system:8081/api/auth/check-token
    secret: ${JWT_SECRET:psychological-scale-secret-key-2026}
    expire: ${JWT_EXPIRE:7200000}
    refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}
    # 排除路径
    excludes:
      - /error
      - /api/auth/**