server:
  port: 8088

spring:
  application:
    name: smart-gateway

  profiles:
    active: local

  http:
    codecs:
      max-in-memory-size: 10MB

  # Jackson 配置项
  jackson:
    serialization:
      write-dates-as-timestamps: true
      write-date-timestamps-as-nanoseconds: false
      write-durations-as-timestamps: true
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: true
      fail-on-null-for-primitives: false

  config:
    import:
      - optional:classpath:application-${spring.profiles.active}.yml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml

  cloud:
    nacos:
      # 服务发现配置
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
        watch-delay: 5000
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      # 配置中心配置
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # 系统服务
            - id: smart-user-api
              uri: lb://smart-system
              predicates:
                - Path=/api/user/**,/api/enterprise/**,/api/user-group/**,/api/department/**
              filters:
                - StripPrefix=0
                - RewritePath=/api/user/v3/api-docs, /v3/api-docs
            - id: smart-auth-api
              uri: lb://smart-system
              predicates:
                - Path=/api/auth/**,/api/role/**,/api/permission/**
              filters:
                - StripPrefix=0
                - RewritePath=/api/auth/v3/api-docs, /v3/api-docs
            # 订单服务
            - id: smart-oms-api
              uri: lb://smart-oms
              predicates:
                - Path=/api/order/**,/api/cart/**,/api/enterprise-quota/**
              filters:
                - StripPrefix=0
                - RewritePath=/api/oms/v3/api-docs, /v3/api-docs
            # 支付服务
            - id: smart-payment-api
              uri: lb://smart-payment
              predicates:
                - Path=/api/payment/**
              filters:
                - StripPrefix=0
                - RewritePath=/api/payment/v3/api-docs, /v3/api-docs
            # 分析服务
            - id: smart-analysis-api
              uri: lb://smart-analysis
              predicates:
                - Path=/api/analysis/**
              filters:
                - StripPrefix=0
                - RewritePath=/api/analysis/v3/api-docs, /v3/api-docs
            # 量表服务（包含report和thirdparty模块）
            - id: smart-scale-api
              uri: lb://smart-scale
              predicates:
                - Path=/api/scale/**,/api/scale-category/**,/api/scale/thirdparty/**,/api/exam/**,/api/exam-record/**,/api/scale/report/**,/api/template/**,/api/sync/**,/api/callback/**,/api/config/**
              filters:
                - StripPrefix=0
                - RewritePath=/api/scale/v3/api-docs, /v3/api-docs
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:psychological-scale-secret-key-2026}
  issuer: ${JWT_ISSUER:psychological-scale}
  access-token-validity: 7200
  refresh-token-validity: 604800

# Sentinel配置
sentinel:
  eager: true
  transport:
    dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
  gateway:
    discovery:
      locator:
        enabled: true

# 日志配置
logging:
  level:
    root: INFO
    # org.springframework.cloud.gateway: DEBUG
    #　org.springframework.cloud.gateway.route: DEBUG
    # org.springframework.cloud.gateway.handler: DEBUG
    com.iotsic.smart.gateway: DEBUG
    # com.alibaba.cloud.nacos: DEBUG
    # org.springframework.cloud.loadbalancer: DEBUG

smart:
  # security配置
  security:
    check-url: http://smart-system/api/auth/check-token
    secret: ${JWT_SECRET:psychological-scale-secret-key-2026}
    expire: ${JWT_EXPIRE:7200000}
    refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}
    # 排除路径
    excludes:
      - /error
      - /api/auth/**