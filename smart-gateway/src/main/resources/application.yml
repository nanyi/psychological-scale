server:
  port: 8088

spring:
  application:
    name: smart-gateway
  cloud:
    nacos:
      # 服务发现配置
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
        watch-delay: 5000
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      # 配置中心配置
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # 系统服务
                    - id: smart-system
                      uri: http://localhost:8081
                      predicates:
                        - Path=/api/user/**,/api/auth/**,/api/role/**,/api/permission/**,/api/enterprise/**,/api/user-group/**,/api/department/**
                      filters:
                        - StripPrefix=0
                    # 量表服务（包含report和thirdparty模块）
                    - id: smart-scale
                      uri: http://localhost:8082
                      predicates:
                        - Path=/api/scale/**,/api/scale-category/**,/api/scale/thirdparty/**,/api/exam/**,/api/exam-record/**,/api/scale/report/**,/api/template/**,/api/sync/**,/api/callback/**,/api/config/**
                      filters:
                        - StripPrefix=0
                    # 订单服务
                    - id: smart-oms
                      uri: http://localhost:8084
                      predicates:
                        - Path=/api/order/**,/api/cart/**,/api/enterprise-quota/**
                      filters:
                        - StripPrefix=0
                    # 支付服务
                    - id: smart-payment
                      uri: lb://smart-payment
                      predicates:
                        - Path=/api/payment/**
                      filters:
                        - StripPrefix=0
                    # 分析服务
                    - id: smart-analysis
                      uri: http://localhost:8083
                      predicates:
                        - Path=/api/analysis/**
                      filters:
                        - StripPrefix=0
  config:
    import:
      optional: nacos
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:psychological-scale-secret-key-2026}
  issuer: ${JWT_ISSUER:psychological-scale}
  access-token-validity: 7200
  refresh-token-validity: 604800

# Sentinel配置
sentinel:
  eager: true
  transport:
    dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
  gateway:
    discovery:
      locator:
        enabled: true

# 日志配置
logging:
  level:
    root: INFO
    # org.springframework.cloud.gateway: DEBUG
    #　org.springframework.cloud.gateway.route: DEBUG
    # org.springframework.cloud.gateway.handler: DEBUG
    com.iotsic.smart.gateway: DEBUG
    # com.alibaba.cloud.nacos: DEBUG
    # org.springframework.cloud.loadbalancer: DEBUG
