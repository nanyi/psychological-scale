server:
  port: 8083

spring:
  application:
    name: ps-analysis
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
        watch-delay: 5000
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:psychological_scale}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootroot}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # 多包名使用 英文,分隔
  mapper-package: com.iotsic.ps.**.mapper
  type-aliases-package: com.iotsic.ps.**.entity
  mapper-locations: classpath*:/mapper/**/*.xml

# Swagger3 配置项
springdoc:
  api-docs:
    # 是否开启接口文档
    enabled: true
  #  swagger-ui:
  #    # 持久化认证数据
  #    persistAuthorization: true
  info:
    # 标题
    title: '标题：多租户管理系统_接口文档'
    # 描述
    description: '描述：用于管理集团旗下公司的人员信息,具体包括XXX,XXX模块...'
    # 版本
    version: '版本号: ${smart.info.version}'
    # 作者信息
    contact:
      name: Sugela Team
      email: tech@sugela.cn
      url: https://gitee.com/sugela/iotsic-smart
  components:
    # 鉴权方式配置
    security-schemes:
      apiKey:
        type: APIKEY
        in: HEADER
        name: ${smart.security.token-name}

logging:
  level:
    root: INFO
    # org.springframework.cloud.gateway: DEBUG
    #　org.springframework.cloud.gateway.route: DEBUG
    # org.springframework.cloud.gateway.handler: DEBUG
    com.iotsic.ps.gateway: DEBUG

smart:
  info:
    version: 1.0.0
  # security配置
  security:
    secret: ${JWT_SECRET:psychological-scale-secret-key-2026}
    expire: ${JWT_EXPIRE:7200000}
    refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}
    # 排除路径
    excludes:
      - /error
    token-name: token